name: Build unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project PhoneAI.xcodeproj \
            -scheme PhoneAI \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/PhoneAI.app Payload/
          zip -r PhoneAI-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhoneAI-unsigned-ipa
          path: PhoneAI-unsigned.ipa
