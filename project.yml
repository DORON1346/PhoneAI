name: PhoneAI
options:
  bundleIdPrefix: com.doron.phoneai
  deploymentTarget:
    iOS: "17.0"
packages:
  LLMSwift:
    url: https://github.com/eastriverlee/LLM.swift
    branch: main
targets:
  PhoneAI:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: LLMSwift
        product: LLM
    entitlements:
      path: PhoneAI.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.doron.phoneai
        MARKETING_VERSION: "0.4.0"
        CURRENT_PROJECT_VERSION: "4"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: PhoneAI
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "PhoneAI needs the microphone to hear your voice commands."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "PhoneAI needs speech recognition to understand your commands."
        INFOPLIST_KEY_NSCameraUsageDescription: "PhoneAI needs the camera for vision features."
